<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Trame 3D Visualization - DEM MCM Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body, #trame-container {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="trame-container">
        <!-- Loading overlay -->
        <div id="loading-overlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p>Loading 3D visualization...</p>
        </div>
        
        <!-- Trame iframe -->
        <iframe 
            id="trame-iframe"
            src="http://127.0.0.1:8081/"
            allowfullscreen
            style="display:none;">
        </iframe>
    </div>

    <script>
        // Hide loading overlay when iframe loads
        document.getElementById('trame-iframe').onload = function() {
            document.getElementById('loading-overlay').style.display = 'none';
            this.style.display = 'block';
        };
        
        // Handle iframe load errors
        document.getElementById('trame-iframe').onerror = function() {
            document.getElementById('loading-overlay').innerHTML = '
                <div style="text-align:center;">
                    <div style="font-size:48px; margin-bottom:20px;">⚠️</div>
                    <p>Failed to load Trame visualization.</p>
                    <p>Make sure the Trame app is running on port 8081:</p>
                    <code>cd /kaggle/working/trame_project && python 3D.py --port 8081</code>
                </div>
            ';
        };
    </script>
</body>
</html>
